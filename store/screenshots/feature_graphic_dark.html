<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1024px; height:500px; overflow:hidden;
  background: linear-gradient(135deg, #1A1F35 0%, #141828 60%, #0F1220 100%);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Arial,sans-serif;
  display:flex; align-items:center; justify-content:center;
}

.mic-wrap {
  position:relative;
  width:120px; height:120px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:20px;
}
.mic-pulse-2 {
  position:absolute;
  width:120px; height:120px; border-radius:60px;
  background:rgba(124,158,255,.12);
}
.mic-pulse-1 {
  position:absolute;
  width:96px; height:96px; border-radius:48px;
  background:rgba(124,158,255,.2);
}
.mic-btn {
  width:72px; height:72px; border-radius:36px;
  background:linear-gradient(135deg,#7C9EFF,#5B7FE8);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 32px rgba(124,158,255,.35);
  position:relative; z-index:1;
}
.mic-inner { display:flex; flex-direction:column; align-items:center; }
.mic-body { width:14px; height:20px; border-radius:7px; border:3px solid #fff; margin-bottom:2px; }
.mic-stand { width:2px; height:6px; background:#fff; }
.mic-base { width:14px; height:2px; border-radius:1px; background:#fff; margin-top:-1px; }

.container { display:flex; flex-direction:column; align-items:center; }

.app-name {
  font-size:52px; font-weight:800; color:#fff;
  letter-spacing:-1px; line-height:1;
  text-shadow:0 0 40px rgba(124,158,255,.4);
}
.tagline {
  font-size:22px; font-weight:500; color:rgba(255,255,255,.7);
  margin-top:10px; letter-spacing:.2px;
}
.sub {
  font-size:14px; font-weight:400; color:rgba(124,158,255,.7);
  margin-top:8px; letter-spacing:.8px; text-transform:uppercase;
}

.bubble {
  position:absolute; border-radius:50%;
  background:rgba(124,158,255,.06);
}
</style>
</head>
<body>

<!-- Background decorative bubbles -->
<div class="bubble" style="width:320px;height:320px;top:-80px;left:-80px"></div>
<div class="bubble" style="width:200px;height:200px;bottom:-60px;right:60px"></div>
<div class="bubble" style="width:120px;height:120px;top:40px;right:180px"></div>
<div class="bubble" style="width:80px;height:80px;bottom:30px;left:200px"></div>

<!-- Subtle grid lines -->
<div style="position:absolute;inset:0;opacity:.04;
  background-image:linear-gradient(#7C9EFF 1px,transparent 1px),linear-gradient(90deg,#7C9EFF 1px,transparent 1px);
  background-size:40px 40px"></div>

<!-- Floating mini transaction cards (left) -->
<div style="position:absolute;left:48px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px">
  <div style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;
    padding:12px 16px;display:flex;align-items:center;gap:10px;width:200px">
    <div style="width:36px;height:36px;border-radius:10px;background:rgba(255,100,120,.15);
      display:flex;align-items:center;justify-content:center;font-size:16px">🛒</div>
    <div>
      <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.9)">Courses Migros</div>
      <div style="font-size:11px;color:#FFB3B3;margin-top:2px">-186.40 CHF</div>
    </div>
  </div>
  <div style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;
    padding:12px 16px;display:flex;align-items:center;gap:10px;width:200px">
    <div style="width:36px;height:36px;border-radius:10px;background:rgba(107,203,119,.15);
      display:flex;align-items:center;justify-content:center;font-size:16px">💼</div>
    <div>
      <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.9)">Salaire juin</div>
      <div style="font-size:11px;color:#6BCB77;margin-top:2px">+5 840 CHF</div>
    </div>
  </div>
</div>

<!-- Floating mini stats card (right) -->
<div style="position:absolute;right:48px;top:50%;transform:translateY(-50%)">
  <div style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:16px;
    padding:16px 20px;width:190px">
    <div style="font-size:11px;font-weight:700;color:rgba(124,158,255,.7);
      text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Juin 2026</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:12px;color:rgba(255,255,255,.5)">Revenus</span>
      <span style="font-size:13px;font-weight:700;color:#6BCB77">+5 840</span>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:12px;color:rgba(255,255,255,.5)">Dépenses</span>
      <span style="font-size:13px;font-weight:700;color:#FFB3B3">-3 210</span>
    </div>
    <div style="height:1px;background:rgba(255,255,255,.1);margin:8px 0"></div>
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:12px;color:rgba(255,255,255,.5)">Solde</span>
      <span style="font-size:14px;font-weight:800;color:#7C9EFF">+2 630</span>
    </div>
  </div>
</div>

<!-- Center content -->
<div class="container">
  <div class="mic-wrap">
    <div class="mic-pulse-2"></div>
    <div class="mic-pulse-1"></div>
    <div class="mic-btn">
      <div class="mic-inner">
        <div class="mic-body"></div>
        <div class="mic-stand"></div>
        <div class="mic-base"></div>
      </div>
    </div>
  </div>
  <div class="app-name">EasyCompta</div>
  <div class="tagline">Finances vocales &amp; intelligentes</div>
  <div class="sub">Parle · L'IA enregistre</div>
</div>

</body></html>
