<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:430px; height:932px; overflow:hidden; background:#141828;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Arial,sans-serif; }
.status { display:flex; justify-content:space-between; align-items:center;
  padding:14px 28px 0; font-size:15px; font-weight:600; color:rgba(255,255,255,.9); }
.status-right { display:flex; align-items:center; gap:6px; font-size:13px; }
</style>
</head><body>

<div class="status">
  <span>9:41</span>
  <div class="status-right"><span>●●●●</span><span>WiFi</span><span>🔋</span></div>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;padding:16px 24px 8px">
  <div>
    <div style="font-size:22px;font-weight:800;color:rgba(255,255,255,.9)">Bonjour 👋</div>
    <div style="font-size:13px;color:rgba(255,255,255,.45);margin-top:2px">👨‍👩‍👧 Famille Monti</div>
  </div>
  <div style="display:flex;gap:8px">
    <div style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px">↻</div>
    <div style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px">💰</div>
    <div style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px">📋</div>
    <div style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px">⚙</div>
  </div>
</div>

<div style="margin:0 24px 8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px;display:flex;">
  <div style="flex:1;text-align:center"><div style="font-size:10px;color:rgba(255,255,255,.35);font-weight:600;text-transform:uppercase">Revenus</div><div style="font-size:17px;font-weight:800;color:#6BCB77;margin-top:3px">+5 840</div></div>
  <div style="width:1px;background:rgba(255,255,255,.12);margin:2px 0"></div>
  <div style="flex:1;text-align:center"><div style="font-size:10px;color:rgba(255,255,255,.35);font-weight:600;text-transform:uppercase">Dépenses</div><div style="font-size:17px;font-weight:800;color:#FFB3B3;margin-top:3px">-3 210</div></div>
  <div style="width:1px;background:rgba(255,255,255,.12);margin:2px 0"></div>
  <div style="flex:1;text-align:center"><div style="font-size:10px;color:rgba(255,255,255,.35);font-weight:600;text-transform:uppercase">Solde</div><div style="font-size:17px;font-weight:800;color:#7C9EFF;margin-top:3px">+2 630</div></div>
</div>

<!-- Mic — recording state (pink) -->
<div style="display:flex;flex-direction:column;align-items:center;padding:40px 0 24px">
  <div style="position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center">
    <div style="position:absolute;width:180px;height:180px;border-radius:90px;background:rgba(255,158,174,.1)"></div>
    <div style="position:absolute;width:145px;height:145px;border-radius:72px;background:rgba(255,158,174,.18)"></div>
    <div style="width:110px;height:110px;border-radius:55px;background:#FF9EAE;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 8px 32px rgba(255,158,174,.45);position:relative;z-index:1">
      <div style="display:flex;flex-direction:column;align-items:center">
        <div style="width:18px;height:26px;border-radius:9px;border:3px solid #fff;margin-bottom:2px"></div>
        <div style="width:2px;height:8px;background:#fff"></div>
        <div style="width:18px;height:2px;border-radius:1px;background:#fff;margin-top:-1px"></div>
      </div>
    </div>
  </div>

  <div style="margin-top:16px;font-size:17px;color:rgba(255,255,255,.9);font-weight:700">Je t'écoute…</div>
  <div style="margin-top:8px;font-size:13px;color:rgba(255,255,255,.4)">Relâche quand tu as fini</div>

  <!-- Waveform -->
  <div style="display:flex;align-items:center;gap:4px;margin-top:28px">
    <div style="width:4px;height:20px;background:#FF9EAE;border-radius:2px;opacity:.7"></div>
    <div style="width:4px;height:36px;background:#FF9EAE;border-radius:2px"></div>
    <div style="width:4px;height:52px;background:#FF9EAE;border-radius:2px"></div>
    <div style="width:4px;height:28px;background:#FF9EAE;border-radius:2px;opacity:.8"></div>
    <div style="width:4px;height:44px;background:#FF9EAE;border-radius:2px"></div>
    <div style="width:4px;height:60px;background:#FF9EAE;border-radius:2px"></div>
    <div style="width:4px;height:36px;background:#FF9EAE;border-radius:2px;opacity:.8"></div>
    <div style="width:4px;height:48px;background:#FF9EAE;border-radius:2px"></div>
    <div style="width:4px;height:32px;background:#FF9EAE;border-radius:2px;opacity:.6"></div>
    <div style="width:4px;height:56px;background:#FF9EAE;border-radius:2px"></div>
    <div style="width:4px;height:40px;background:#FF9EAE;border-radius:2px;opacity:.7"></div>
    <div style="width:4px;height:24px;background:#FF9EAE;border-radius:2px;opacity:.5"></div>
  </div>

  <!-- Transcript bubble -->
  <div style="margin-top:32px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;
    padding:18px 24px;margin-left:32px;margin-right:32px;width:calc(100% - 64px)">
    <div style="font-size:15px;color:#7C9EFF;font-weight:600;font-style:italic;text-align:center">
      "J'ai payé 45 francs au supermarché Coop…"
    </div>
  </div>
</div>

<!-- Recent transactions dimmed -->
<div style="margin:0 24px;font-size:16px;font-weight:700;color:rgba(255,255,255,.9);opacity:.2">Dernières transactions</div>
<div style="margin:8px 16px;background:rgba(255,255,255,.07);border-radius:16px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;opacity:.2">
  <div style="width:40px;height:40px;border-radius:12px;background:rgba(255,100,100,.2);
    display:flex;align-items:center;justify-content:center;font-size:18px">🛒</div>
  <div style="flex:1">
    <div style="font-size:14px;font-weight:600;color:rgba(255,255,255,.9)">Courses Migros</div>
    <div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:2px">Courses · 05.06.2026</div>
  </div>
  <div style="font-size:15px;font-weight:700;color:#FFB3B3">-186.40 CHF</div>
</div>

<div style="height:34px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px">
  <div style="width:134px;height:5px;background:#fff;border-radius:3px;opacity:.25"></div>
</div>
</body></html>
