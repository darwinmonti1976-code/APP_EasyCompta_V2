<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1024px; height:500px; overflow:hidden;
  background: linear-gradient(135deg, #7C9EFF 0%, #5B7FE8 60%, #4A6FD8 100%);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Arial,sans-serif;
  display:flex; align-items:center; justify-content:center;
}

.container {
  display:flex; flex-direction:column; align-items:center; gap:0;
}

/* Mic icon */
.mic-wrap {
  position:relative;
  width:120px; height:120px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:20px;
}
.mic-pulse-2 {
  position:absolute;
  width:120px; height:120px; border-radius:60px;
  background:rgba(255,255,255,.12);
}
.mic-pulse-1 {
  position:absolute;
  width:96px; height:96px; border-radius:48px;
  background:rgba(255,255,255,.18);
}
.mic-btn {
  width:72px; height:72px; border-radius:36px;
  background:rgba(255,255,255,.95);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
  position:relative; z-index:1;
}
.mic-inner {
  display:flex; flex-direction:column; align-items:center;
}
.mic-body {
  width:14px; height:20px; border-radius:7px;
  border:3px solid #5B7FE8; margin-bottom:2px;
}
.mic-stand { width:2px; height:6px; background:#5B7FE8; }
.mic-base {
  width:14px; height:2px; border-radius:1px;
  background:#5B7FE8; margin-top:-1px;
}

/* Text */
.app-name {
  font-size:52px; font-weight:800; color:#fff;
  letter-spacing:-1px; line-height:1;
  text-shadow:0 2px 16px rgba(0,0,0,.15);
}
.tagline {
  font-size:22px; font-weight:500; color:rgba(255,255,255,.85);
  margin-top:10px; letter-spacing:.2px;
}
.sub {
  font-size:17px; font-weight:400; color:rgba(255,255,255,.6);
  margin-top:8px; letter-spacing:.5px; text-transform:uppercase;
  font-size:14px;
}

/* Decorative bubbles */
.bubble {
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,.07);
}
</style>
</head>
<body>

<!-- Background decorative bubbles -->
<div class="bubble" style="width:320px;height:320px;top:-80px;left:-80px"></div>
<div class="bubble" style="width:200px;height:200px;bottom:-60px;right:60px"></div>
<div class="bubble" style="width:120px;height:120px;top:40px;right:180px"></div>
<div class="bubble" style="width:80px;height:80px;bottom:30px;left:200px"></div>

<!-- Floating mini transaction cards (left) -->
<div style="position:absolute;left:48px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px">
  <div style="background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:14px;
    padding:12px 16px;display:flex;align-items:center;gap:10px;width:200px">
    <div style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;font-size:16px">🛒</div>
    <div>
      <div style="font-size:12px;font-weight:700;color:#fff">Courses Migros</div>
      <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:2px">-186.40 CHF</div>
    </div>
  </div>
  <div style="background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:14px;
    padding:12px 16px;display:flex;align-items:center;gap:10px;width:200px">
    <div style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;font-size:16px">💼</div>
    <div>
      <div style="font-size:12px;font-weight:700;color:#fff">Salaire juin</div>
      <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:2px">+5 840 CHF</div>
    </div>
  </div>
</div>

<!-- Floating mini stats card (right) -->
<div style="position:absolute;right:48px;top:50%;transform:translateY(-50%)">
  <div style="background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:16px;
    padding:16px 20px;width:190px">
    <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.6);
      text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Juin 2026</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:12px;color:rgba(255,255,255,.7)">Revenus</span>
      <span style="font-size:13px;font-weight:700;color:#A8E6B5">+5 840</span>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:12px;color:rgba(255,255,255,.7)">Dépenses</span>
      <span style="font-size:13px;font-weight:700;color:#FFB3B3">-3 210</span>
    </div>
    <div style="height:1px;background:rgba(255,255,255,.2);margin:8px 0"></div>
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:12px;color:rgba(255,255,255,.7)">Solde</span>
      <span style="font-size:14px;font-weight:800;color:#fff">+2 630</span>
    </div>
  </div>
</div>

<!-- Center content -->
<div class="container">
  <div class="mic-wrap">
    <div class="mic-pulse-2"></div>
    <div class="mic-pulse-1"></div>
    <div class="mic-btn">
      <div class="mic-inner">
        <div class="mic-body"></div>
        <div class="mic-stand"></div>
        <div class="mic-base"></div>
      </div>
    </div>
  </div>
  <div class="app-name">EasyCompta</div>
  <div class="tagline">Finances vocales &amp; intelligentes</div>
  <div class="sub">Parle · L'IA enregistre</div>
</div>

</body></html>
